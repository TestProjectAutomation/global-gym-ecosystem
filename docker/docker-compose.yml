# docker/docker-compose.yml

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: gym-ecosystem-db
    environment:
      POSTGRES_DB: gym_ecosystem
      POSTGRES_USER: gym_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - gym-network
    restart: always

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: gym-ecosystem-redis
    ports:
      - "6379:6379"
    networks:
      - gym-network
    restart: always

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: gym-ecosystem-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gym_ecosystem
      DB_USER: gym_admin
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - gym-network
    restart: always
    volumes:
      - ../backend:/app
      - /app/node_modules

  # Web Dashboard
  web-dashboard:
    build:
      context: ../web-dashboard
      dockerfile: ../docker/web.Dockerfile
    container_name: gym-ecosystem-web
    environment:
      REACT_APP_API_URL: http://backend:3000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gym-network
    restart: always

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gym-ecosystem-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "443:443"
    depends_on:
      - backend
      - web-dashboard
    networks:
      - gym-network
    restart: always

networks:
  gym-network:
    driver: bridge

volumes:
  postgres_data: