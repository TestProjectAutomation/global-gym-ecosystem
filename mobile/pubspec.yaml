# mobile/pubspec.yaml
name: gym_ecosystem
description: Global Gym Management Mobile App
version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1
  
  # State Management
  provider: ^6.0.5
  
  # Networking
  http: ^1.0.0
  socket_io_client: ^2.0.1
  
  # Storage
  shared_preferences: ^2.1.1
  sqflite: ^2.3.0
  
  # QR Code
  qr_flutter: ^4.0.0
  mobile_scanner: ^3.2.0
  
  # Calendar
  hijri: ^3.0.0
  persian_date: ^2.0.0
  
  # UI
  flutter_svg: ^2.0.5
  cached_network_image: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/translations/
    - assets/icons/
    - assets/images/