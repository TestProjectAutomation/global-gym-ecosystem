version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gym-db
    environment:
      POSTGRES_DB: gym_ecosystem
      POSTGRES_USER: gym_admin
      POSTGRES_PASSWORD: Gym@2024Secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: gym-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    image: node:18-alpine
    container_name: gym-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm start"
    environment:
      DB_HOST: postgres
      DB_USER: gym_admin
      DB_PASSWORD: Gym@2024Secure
      DB_NAME: gym_ecosystem
      REDIS_HOST: redis
      JWT_SECRET: GymSecret2024
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: always

  web:
    image: nginx:alpine
    container_name: gym-web
    volumes:
      - ./web-dashboard:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
